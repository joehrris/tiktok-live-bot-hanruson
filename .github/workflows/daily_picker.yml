name: Daily Song Picker

on:
  schedule:
    # 16:45 UTC = 5:45pm BST (summer/UTC+1). Drifts to 4:45pm in winter (GMT/UTC+0).
    - cron: '45 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick today's song picker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: python pick_song_picker.py

      - name: Commit state file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add live_state.json
          git diff --staged --quiet || git commit -m "Update picker state"
          git push
