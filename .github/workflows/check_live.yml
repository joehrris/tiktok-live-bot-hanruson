name: Check TikTok Live

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore live state cache
        uses: actions/cache@v4
        with:
          path: live_state.json
          key: tiktok-live-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: python bot.py

      - name: Save live state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: live_state.json
          key: tiktok-live-state
